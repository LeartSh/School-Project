<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | City Mall</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-container {
    width: 360px;
    padding: 35px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    color: #fff;
}

/* Logo */
.logo {
    text-align: center;
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 10px;
}

.logo span {
    color: #3b82f6;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    color: #ccc;
    margin-bottom: 25px;
}

.input-group {
    margin-bottom: 18px;
}

.input-group label {
    font-size: 13px;
    color: #bbb;
}

.input-group input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: #fff;
    transition: 0.2s;
}

.input-group input:focus {
    background: rgba(255,255,255,0.15);
}

.options {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 20px;
}

.options a {
    color: #3b82f6;
    text-decoration: none;
}

/* Button */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #3b82f6;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #2563eb;
}

.footer {
    text-align: center;
    font-size: 13px;
    margin-top: 20px;
    color: #aaa;
}

.footer a {
    color: #3b82f6;
    text-decoration: none;
}

.login-container {
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<div class="login-container">

    <div class="logo">CITY<span>MALL</span></div>
    <div class="subtitle">Mirësevini përsëri 👋</div>

    <form id="loginForm">

        <div class="input-group">
            <label>Përdoruesi / Email</label>
            <input type="text" id="username" placeholder="Shkruani username..." required>
        </div>

        <div class="input-group">
            <label>Fjalëkalimi</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div class="options">
            <label><input type="checkbox"> Më mbaj mend</label>
            <a href="#">Harruat?</a>
        </div>

        <button type="submit" class="btn">Hyr në Sistem</button>

    </form>

    <div class="footer">
        Nuk keni llogari? <a href="#">Kontakto Adminin</a>
    </div>

</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;

    if(user === 'admin' && pass === 'admin') {
        localStorage.setItem('userRole', 'admin');
        localStorage.setItem('userName', 'Leart Shulina');

        // FIXED PATH
        window.location.href = 'main/dashboard.php';
    } else {
        localStorage.setItem('userRole', 'user');
        localStorage.setItem('userName', user);

        window.location.href = 'index.php';
    }
});
</script>

</body>
</html>
